<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biryani Ka Baap</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff3e6;
    }

    header {
      background: #d62828;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      margin: 15px 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .btn {
      display: block;
      text-align: center;
      background: #25D366;
      color: white;
      padding: 15px;
      margin: 20px 0;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <h1>Biryani Ka Baap</h1>
  <p>Best Home Made Biryani 🍛</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908177522-040f2f4c5c1f" />
    <div class="card-content">
      <h3>Chicken Biryani</h3>
      <p class="price">Rs. 250</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398" />
    <div class="card-content">
      <h3>Tandoori Chicken Biryani</h3>
      <p class="price">Rs. 300</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950" />
    <div class="card-content">
      <h3>Spice Lover Chicken Biryani</h3>
      <p class="price">Rs. 320</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908554162-45f0b0a4c6f5" />
    <div class="card-content">
      <h3>Kabab Chicken Biryani</h3>
      <p class="price">Rs. 350</p>
    </div>
  </div>

  <a class="btn" href="https://wa.me/923306118493">
    Order on WhatsApp 📲
  </a>

</div>

</body>
</html>
